 raid_events.1.t:0 "[SCOPE.sCountry('raid_raider').GetName] has raided us in [SCOPE.sLocation('raid_location').GetName]!"
  raid_events.1.d:0 "The forces of [SCOPE.sCountry('raid_raider').GetAdjective] have descended upon [SCOPE.sLocation('raid_location').GetName], pillaging the countryside and seizing a great amount of gold. The local prosperity has fallen and the development of the area has been set back."
  raid_events.1.a:0 "This will not go unpunished."



